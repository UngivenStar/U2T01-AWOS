<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamVibe — Explora YouTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">StreamVibe</span>
      </div>
      <nav class="nav-tabs">
        <button class="tab active" data-tab="trending">Tendencias</button>
        <button class="tab" data-tab="search">Buscar</button>
        <button class="tab" data-tab="player">Reproductor</button>
      </nav>
    </div>
  </header>

  <main>
    <!-- TRENDING -->
    <section class="panel active" id="panel-trending">
      <div class="section-header">
        <h2>Lo más visto ahora</h2>
        <div class="region-select">
          <select id="region-select">
            <option value="MX">🇲🇽 México</option>
            <option value="US">🇺🇸 EE.UU.</option>
            <option value="ES">🇪🇸 España</option>
            <option value="AR">🇦🇷 Argentina</option>
          </select>
        </div>
      </div>
      <div id="trending-grid" class="video-grid">
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </section>

    <!-- SEARCH -->
    <section class="panel" id="panel-search">
      <div class="search-hero">
        <h2>¿Qué quieres ver?</h2>
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Busca videos, canales, temas..." />
          <button id="search-btn">Buscar</button>
        </div>
        <div class="quick-tags">
          <span class="tag" data-q="música en vivo">música en vivo</span>
          <span class="tag" data-q="tutoriales programación">programación</span>
          <span class="tag" data-q="documentales naturaleza">naturaleza</span>
          <span class="tag" data-q="noticias México">noticias</span>
          <span class="tag" data-q="gaming highlights">gaming</span>
        </div>
      </div>
      <div id="search-results" class="video-grid"></div>
    </section>

    <!-- PLAYER -->
    <section class="panel" id="panel-player">
      <div class="player-empty" id="player-empty">
        <div class="player-empty-icon">▶</div>
        <p>Selecciona un video para reproducirlo aquí</p>
        <small>Haz clic en cualquier miniatura desde Tendencias o Búsqueda</small>
      </div>
      <div class="player-layout" id="player-layout" style="display:none">
        <div class="player-main">
          <div class="video-wrapper">
            <iframe id="yt-frame" frameborder="0" allowfullscreen
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
            </iframe>
          </div>
          <div class="video-meta" id="video-meta"></div>
        </div>
        <div class="player-sidebar" id="related-videos"></div>
      </div>
    </section>
  </main>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
